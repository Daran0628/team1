<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; script-src 'self'">
    <title>대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<div class="app-shell">
    <div id="shellSlot"></div>
    <div class="app-main" id="appMain">
      <div class="dashboard-body">

        <div class="dash-row-top">
            <section class="card">
                <div class="welcome-top">
                    <div class="avatar-circle"><i class="fa-solid fa-user"></i></div>
                    <div>
                        <h2 id="welcomeName">-님, 환영합니다!</h2>
                        <p class="muted">오늘도 좋은 하루 되세요.</p>
                    </div>
                </div>
                <div class="welcome-meta">
                    <div class="meta-box"><span class="meta-label">소속</span><span class="meta-value" id="welcomeDept">-</span></div>
                    <div class="meta-box"><span class="meta-label">재직구분</span><span class="meta-value" id="welcomeWorkType">-</span></div>
                    <div class="meta-box"><span class="meta-label">이메일</span><span class="meta-value" id="welcomeEmail">-</span></div>
                    <div class="meta-box"><span class="meta-label">마지막 로그인</span><span class="meta-value" id="welcomeLastLogin">-</span></div>
                </div>
            </section>

            <section class="card">
                <div class="card-head"><h3>바로가기</h3></div>
                <div class="shortcut-grid">
                    <a class="shortcut-item" href="/ticket"><span class="shortcut-icon"><i class="fa-solid fa-headset"></i></span>헬프데스크</a>
                    <a class="shortcut-item" href="/mail"><span class="shortcut-icon"><i class="fa-solid fa-envelope"></i></span>메일</a>
                    <a class="shortcut-item" href="/notice"><span class="shortcut-icon"><i class="fa-solid fa-bullhorn"></i></span>공지사항</a>
                    <a class="shortcut-item" href="/faq"><span class="shortcut-icon"><i class="fa-solid fa-circle-question"></i></span>FAQ</a>
                    <a class="shortcut-item" href="/chat"><span class="shortcut-icon"><i class="fa-solid fa-comment-dots"></i></span>Chatting</a>
                    <a class="shortcut-item" href="/board"><span class="shortcut-icon"><i class="fa-solid fa-clipboard-list"></i></span>게시판</a>
                    <a class="shortcut-item" href="/cafeteria"><span class="shortcut-icon"><i class="fa-solid fa-utensils"></i></span>오늘의 식사</a>
                    <a class="shortcut-item" href="/objstorage"><span class="shortcut-icon"><i class="fa-solid fa-box-archive"></i></span>공유 스토리지</a>
                    <a class="shortcut-item" href="/vdi/list"><span class="shortcut-icon"><i class="fa-solid fa-display"></i></span>VDI</a>
                    <a class="shortcut-item disabled" href="#"><span class="shortcut-icon"><i class="fa-solid fa-code"></i></span>코딩테스트</a>
                    <a class="shortcut-item" href="/person"><span class="shortcut-icon"><i class="fa-solid fa-magnifying-glass"></i></span>인물 검색</a>
                    <a class="shortcut-item" href="/mypage"><span class="shortcut-icon"><i class="fa-solid fa-user"></i></span>마이페이지</a>
                </div>
            </section>
        </div>

        <div class="dash-row-3col">
            <section class="card">
                <div class="card-head"><h3>나의 티켓 현황</h3></div>
                <div class="empty-note">헬프데스크(티켓) 기능은 준비 중입니다.</div>
            </section>

            <section class="card">
                <div class="card-head"><h3>공지사항</h3></div>
                <div class="empty-note">공지사항 기능은 준비 중입니다.</div>
            </section>

            <section class="card">
                <div class="card-head">
                    <h3>메일 요약</h3>
                    <a class="card-link" href="/mail">메일함으로 ›</a>
                </div>
                <div class="pill-list" id="mailSummaryBody">
                    <div class="pill-row"><span>받은 메일</span><span class="pill-count" id="mailInboxCount">-</span></div>
                    <div class="pill-row"><span>보낸 메일</span><span class="pill-count" id="mailSentCount">-</span></div>
                </div>
            </section>
        </div>

        <div class="dash-row-3col">
            <section class="card">
                <div class="card-head">
                    <h3>최근 Chatting</h3>
                    <a class="card-link" href="/chat">전체보기</a>
                </div>
                <div class="chat-list" id="chatListBody">
                    <div class="empty-note">불러오는 중...</div>
                </div>
            </section>

            <section class="card">
                <div class="card-head"><h3>FAQ</h3></div>
                <div class="empty-note">FAQ 기능은 준비 중입니다.</div>
            </section>

            <section class="card">
                <div class="card-head"><h3>게시판</h3></div>
                <div class="empty-note">게시판 기능은 준비 중입니다.</div>
            </section>
        </div>

      </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬프데스크 | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
    <link rel="stylesheet" href="/static/css/ticket.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <span>헬프데스크</span>
    </nav>
    <h1>헬프데스크</h1>
</header>

<main class="main-content">

    <div class="toolbar">
        <div class="toolbar-left"></div>
        <div class="toolbar-right">
            <button class="btn btn-primary" onclick="location.href='/ticket/create'">
                <i class="fa-solid fa-pen"></i> 티켓 등록
            </button>
        </div>
    </div>

    <div class="status-tabs">
        <button class="tab-btn active" onclick="filterByStatus(null, this)">전체</button>
        <button class="tab-btn" onclick="filterByStatus('OPEN', this)"><i class="fa-solid fa-circle-dot"></i> 접수</button>
        <button class="tab-btn" onclick="filterByStatus('IN_PROGRESS', this)"><i class="fa-solid fa-spinner"></i> 처리중</button>
        <button class="tab-btn" onclick="filterByStatus('PENDING', this)"><i class="fa-solid fa-pause"></i> 보류</button>
        <button class="tab-btn" onclick="filterByStatus('RESOLVED', this)"><i class="fa-solid fa-circle-check"></i> 해결</button>
        <button class="tab-btn" onclick="filterByStatus('CLOSED', this)"><i class="fa-solid fa-circle-xmark"></i> 종료</button>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th class="td-num">번호</th>
                    <th>제목</th>
                    <th>우선순위</th>
                    <th>상태</th>
                    <th class="td-date">작성일</th>
                </tr>
            </thead>
            <tbody id="ticket-list">
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:60%"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:45%"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:55%"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
            </tbody>
        </table>
    </div>

</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    let allTickets = [];
    let currentStatus = null;

    if (!token) location.replace('/login');

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function statusBadge(status) {
        const map = {
            'OPEN':        ['badge-open',     '접수'],
            'IN_PROGRESS': ['badge-progress', '처리중'],
            'PENDING':     ['badge-pending',  '보류'],
            'RESOLVED':    ['badge-resolved', '해결'],
            'CLOSED':      ['badge-closed',   '종료'],
        };
        const [cls, label] = map[status] || ['badge-closed', status];
        return `<span class="badge ${cls}">${label}</span>`;
    }

    function priorityBadge(priority) {
        const map = {
            'HIGH':   ['priority-high',   '높음'],
            'MEDIUM': ['priority-medium', '보통'],
            'LOW':    ['priority-low',    '낮음'],
        };
        const [cls, label] = map[priority] || ['priority-medium', priority];
        return `<span class="${cls}">${label}</span>`;
    }

    function filterByStatus(status, btn) {
        currentStatus = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = status ? allTickets.filter(t => t.status === status) : allTickets;
        renderTickets(filtered);
    }

    function renderTickets(list) {
        const tbody = document.getElementById('ticket-list');
        tbody.innerHTML = '';
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon"><i class="fa-solid fa-headset"></i></div><p>등록된 티켓이 없습니다.</p></div></td></tr>`;
            return;
        }
        list.forEach((t, i) => {
            const tr = document.createElement('tr');
            tr.onclick = () => location.href = `/ticket/${t.ticketId}`;
            tr.innerHTML = `
                <td class="td-num">#${t.ticketNo || list.length - i}</td>
                <td class="td-title">${t.title}</td>
                <td>${priorityBadge(t.priority)}</td>
                <td>${statusBadge(t.status)}</td>
                <td class="td-date">${t.createdAt.slice(0,10)}</td>`;
            tbody.appendChild(tr);
        });
    }

    async function loadTickets() {
        try {
            const res = await fetch('/api/tickets', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            allTickets = data.result || [];
            renderTickets(allTickets);
        } catch { showToast('데이터를 불러오지 못했습니다.'); }
    }

    async function loadNotifyCount() {
        if (role !== 'ADMIN' && role !== 'SUPERADMIN') return;
        try {
            const res = await fetch('/api/tickets/notify/count', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            const count = data.result?.count || 0;
            const badge = document.getElementById('notify-badge');
            if (count > 0 && badge) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            }
        } catch {}
    }

    loadTickets();
    loadNotifyCount();
</script>
</body>
</html>

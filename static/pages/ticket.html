<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬프데스크 | 업무지원포털</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; }

        .sidebar { width: 240px; min-height: 100vh; background: #1a1a2e; padding: 2rem 1.25rem; display: flex; flex-direction: column; gap: 6px; position: fixed; top: 0; left: 0; bottom: 0; }
        .logo { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo span { color: #4f46e5; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .nav-item.active { background: #4f46e5; color: #fff; }
        .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
        .sidebar-bottom { margin-top: auto; }

        .main { margin-left: 240px; flex: 1; padding: 2.5rem 2rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.75rem; }
        .page-title { font-size: 1.5rem; font-weight: 700; color: #111827; }
        .btn-write { display: flex; align-items: center; gap: 6px; padding: 0.625rem 1.25rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-write:hover { background: #4338ca; }

        .status-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
        .tab-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #d1d5db; background: #fff; font-size: 0.8rem; font-weight: 600; color: #6b7280; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { border-color: #4f46e5; color: #4f46e5; }
        .tab-btn.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }

        .table-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 0.875rem 1.25rem; text-align: left; font-size: 0.75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f3f4f6; background: #fafafa; }
        tbody tr { border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f9fafb; }
        tbody td { padding: 1rem 1.25rem; font-size: 0.875rem; color: #374151; vertical-align: middle; }
        .td-title { font-weight: 500; color: #111827; }

        .badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .badge-open     { background: #dbeafe; color: #1d4ed8; }
        .badge-progress { background: #fef3c7; color: #b45309; }
        .badge-pending  { background: #ffedd5; color: #c2410c; }
        .badge-resolved { background: #d1fae5; color: #065f46; }
        .badge-closed   { background: #f3f4f6; color: #6b7280; }
        .priority-high   { background: #fee2e2; color: #b91c1c; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .priority-medium { background: #fef3c7; color: #b45309; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .priority-low    { background: #d1fae5; color: #065f46; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

        .empty { padding: 4rem; text-align: center; color: #9ca3af; }
        .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty p { font-size: 0.9rem; }

        .skeleton-row td { padding: 1rem 1.25rem; }
        .skeleton-bar { height: 14px; border-radius: 6px; background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1f2937; color: #fff; padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.875rem; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Work<span>Portal</span></div>
    <a href="/static/pages/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> 대시보드</a>
    <a href="/static/pages/notice.html" class="nav-item"><span class="nav-icon">📢</span> 공지사항</a>
    <a href="/static/pages/faq.html" class="nav-item"><span class="nav-icon">❓</span> FAQ</a>
    <a href="/static/pages/ticket.html" class="nav-item active">
        <span class="nav-icon">🎫</span> 헬프데스크
        <span id="notify-badge" style="display:none;margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;">0</span>
    </a>
    <a href="/static/pages/mypage.html" class="nav-item"><span class="nav-icon">👤</span> 마이페이지</a>
    <a href="/static/pages/admin.html" class="nav-item" id="admin-menu" style="display:none"><span class="nav-icon">⚙️</span> 관리자</a>
    <div class="sidebar-bottom">
        <a href="#" class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> 로그아웃</a>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <h1 class="page-title">헬프데스크</h1>
        <button class="btn-write" onclick="location.href='/static/pages/ticket_create.html'">
            ✏️ 티켓 등록
        </button>
    </div>

    <div class="status-tabs">
        <button class="tab-btn active" onclick="filterByStatus(null, this)">전체</button>
        <button class="tab-btn" onclick="filterByStatus('OPEN', this)">🔵 접수</button>
        <button class="tab-btn" onclick="filterByStatus('IN_PROGRESS', this)">🟡 처리중</button>
        <button class="tab-btn" onclick="filterByStatus('PENDING', this)">🟠 보류</button>
        <button class="tab-btn" onclick="filterByStatus('RESOLVED', this)">🟢 해결</button>
        <button class="tab-btn" onclick="filterByStatus('CLOSED', this)">⚫ 종료</button>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th style="width:60px">번호</th>
                    <th>제목</th>
                    <th>우선순위</th>
                    <th>상태</th>
                    <th>작성일</th>
                </tr>
            </thead>
            <tbody id="ticket-list">
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:60%"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:45%"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:55%"></div></td><td><div class="skeleton-bar" style="width:50px"></div></td><td><div class="skeleton-bar" style="width:60px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    let allTickets = [];
    let currentStatus = null;

    if (!token) location.replace('/login');
    if (role === 'ADMIN' || role === 'SUPERADMIN') {
        document.getElementById('admin-menu').style.display = 'flex';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function statusBadge(status) {
        const map = {
            'OPEN':        ['badge-open',     '접수'],
            'IN_PROGRESS': ['badge-progress', '처리중'],
            'PENDING':     ['badge-pending',  '보류'],
            'RESOLVED':    ['badge-resolved', '해결'],
            'CLOSED':      ['badge-closed',   '종료'],
        };
        const [cls, label] = map[status] || ['badge-closed', status];
        return `<span class="badge ${cls}">${label}</span>`;
    }

    function priorityBadge(priority) {
        const map = {
            'HIGH':   ['priority-high',   '높음'],
            'MEDIUM': ['priority-medium', '보통'],
            'LOW':    ['priority-low',    '낮음'],
        };
        const [cls, label] = map[priority] || ['priority-medium', priority];
        return `<span class="${cls}">${label}</span>`;
    }

    function filterByStatus(status, btn) {
        currentStatus = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = status ? allTickets.filter(t => t.status === status) : allTickets;
        renderTickets(filtered);
    }

    function renderTickets(list) {
        const tbody = document.getElementById('ticket-list');
        tbody.innerHTML = '';
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">🎫</div><p>등록된 티켓이 없습니다.</p></div></td></tr>`;
            return;
        }
        list.forEach((t, i) => {
            const tr = document.createElement('tr');
            tr.onclick = () => location.href = `/static/pages/ticket_detail.html?id=${t.ticketId}`;
            tr.innerHTML = `
                <td style="color:#9ca3af;font-size:0.8rem">#${t.ticketNo || list.length - i}</td>
                <td class="td-title">${t.title}</td>
                <td>${priorityBadge(t.priority)}</td>
                <td>${statusBadge(t.status)}</td>
                <td style="color:#9ca3af;font-size:0.8rem">${t.createdAt.slice(0,10)}</td>`;
            tbody.appendChild(tr);
        });
    }

    async function loadTickets() {
        try {
            const res = await fetch('/api/tickets', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            allTickets = data.result || [];
            renderTickets(allTickets);
        } catch { showToast('데이터를 불러오지 못했습니다.'); }
    }

    async function loadNotifyCount() {
        if (role !== 'ADMIN' && role !== 'SUPERADMIN') return;
        try {
            const res = await fetch('/api/tickets/notify/count', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            const count = data.result?.count || 0;
            const badge = document.getElementById('notify-badge');
            if (count > 0 && badge) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            }
        } catch {}
    }

    function logout() {
        sessionStorage.clear();
        location.replace('/login');
    }

    loadTickets();
    loadNotifyCount();
</script>
</body>
</html>

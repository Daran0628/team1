<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티켓 등록 | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
    <link rel="stylesheet" href="/static/css/ticket.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <a href="/ticket">헬프데스크</a> <span>›</span>
        <span>등록</span>
    </nav>
    <h1>티켓 등록</h1>
</header>

<main class="main-content">
    <a class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> 목록으로</a>

    <div class="form-card">
        <div class="form-group">
            <label class="form-label">제목 *</label>
            <input type="text" class="form-input" id="input-title" placeholder="문제 제목을 입력해주세요">
        </div>
        <div class="form-group">
            <label class="form-label">내용 *</label>
            <textarea class="form-input" id="input-content" placeholder="문제 상황을 자세히 설명해주세요"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">우선순위 *</label>
            <div class="priority-group">
                <button class="priority-btn" id="btn-high" onclick="selectPriority('HIGH')"><i class="fa-solid fa-circle-exclamation"></i> 높음</button>
                <button class="priority-btn selected-medium" id="btn-medium" onclick="selectPriority('MEDIUM')"><i class="fa-solid fa-circle-minus"></i> 보통</button>
                <button class="priority-btn" id="btn-low" onclick="selectPriority('LOW')"><i class="fa-solid fa-circle-down"></i> 낮음</button>
            </div>
        </div>
        <div class="form-footer">
            <button class="btn btn-cancel" onclick="history.back()">취소</button>
            <button class="btn btn-submit" onclick="submitTicket()">등록</button>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    let selectedPriority = 'MEDIUM';

    if (!token) location.replace('/login');

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function selectPriority(priority) {
        selectedPriority = priority;
        document.getElementById('btn-high').className   = 'priority-btn';
        document.getElementById('btn-medium').className = 'priority-btn';
        document.getElementById('btn-low').className    = 'priority-btn';

        if (priority === 'HIGH')   document.getElementById('btn-high').className   = 'priority-btn selected-high';
        if (priority === 'MEDIUM') document.getElementById('btn-medium').className = 'priority-btn selected-medium';
        if (priority === 'LOW')    document.getElementById('btn-low').className    = 'priority-btn selected-low';
    }

    async function submitTicket() {
        const title   = document.getElementById('input-title').value.trim();
        const content = document.getElementById('input-content').value.trim();

        if (!title)   { showToast('제목을 입력해주세요.'); return; }
        if (!content) { showToast('내용을 입력해주세요.'); return; }

        try {
            const res = await fetch('/api/tickets', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, content, priority: selectedPriority })
            });

            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();

            if (data.isSuccess) {
                showToast('티켓이 등록됐습니다!', 'success');
                setTimeout(() => location.replace('/ticket'), 1000);
            } else {
                showToast(data.message || '등록에 실패했습니다.');
            }
        } catch {
            showToast('오류가 발생했습니다.');
        }
    }

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티켓 등록 | 업무지원포털</title>
    <link rel="stylesheet" href="/static/css/common-layout.css">
    <style>
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #6b7280; font-size: 0.875rem; cursor: pointer; margin-bottom: 1.5rem; text-decoration: none; transition: color 0.2s; }
        .back-btn:hover { color: #4f46e5; }
        .page-title { margin-bottom: 1.5rem; }

        .form-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 2rem 2.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit; background: #fff; }
        .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
        textarea.form-input { resize: vertical; min-height: 200px; }
        select.form-input { cursor: pointer; }

        /* 우선순위 선택 */
        .priority-group { display: flex; gap: 10px; }
        .priority-btn { flex: 1; padding: 10px; border: 1.5px solid #d1d5db; border-radius: 8px; background: #fff; font-size: 0.875rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; color: #6b7280; }
        .priority-btn:hover { border-color: #4f46e5; }
        .priority-btn.selected-high { background: #fee2e2; border-color: #b91c1c; color: #b91c1c; }
        .priority-btn.selected-medium { background: #fef3c7; border-color: #b45309; color: #b45309; }
        .priority-btn.selected-low { background: #d1fae5; border-color: #065f46; color: #065f46; }

        .form-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid #f3f4f6; }
        .btn { padding: 10px 24px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-cancel { background: #f3f4f6; color: #374151; }
        .btn-cancel:hover { background: #e5e7eb; }
        .btn-submit { background: #4f46e5; color: #fff; }
        .btn-submit:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Work<span>Portal</span></div>
    <a href="/static/pages/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> 대시보드</a>
    <a href="/static/pages/notice.html" class="nav-item"><span class="nav-icon">📢</span> 공지사항</a>
    <a href="/static/pages/faq.html" class="nav-item"><span class="nav-icon">❓</span> FAQ</a>
    <a href="/static/pages/ticket.html" class="nav-item active"><span class="nav-icon">🎫</span> 헬프데스크</a>
    <a href="/mail" class="nav-item"><span class="nav-icon">📧</span> 메일</a>
                    <a href="/static/pages/mypage.html" class="nav-item"><span class="nav-icon">👤</span> 마이페이지</a>
    <div class="sidebar-bottom">
        <a href="#" class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> 로그아웃</a>
    </div>
</div>

<div class="main">
    <a class="back-btn" onclick="history.back()">← 목록으로</a>
    <h1 class="page-title">티켓 등록</h1>

    <div class="form-card">
        <div class="form-group">
            <label class="form-label">제목 *</label>
            <input type="text" class="form-input" id="input-title" placeholder="문제 제목을 입력해주세요">
        </div>
        <div class="form-group">
            <label class="form-label">내용 *</label>
            <textarea class="form-input" id="input-content" placeholder="문제 상황을 자세히 설명해주세요"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">우선순위 *</label>
            <div class="priority-group">
                <button class="priority-btn" id="btn-high" onclick="selectPriority('HIGH')">🔴 높음</button>
                <button class="priority-btn selected-medium" id="btn-medium" onclick="selectPriority('MEDIUM')">🟡 보통</button>
                <button class="priority-btn" id="btn-low" onclick="selectPriority('LOW')">🟢 낮음</button>
            </div>
        </div>
        <div class="form-footer">
            <button class="btn btn-cancel" onclick="history.back()">취소</button>
            <button class="btn btn-submit" onclick="submitTicket()">등록</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const token = sessionStorage.getItem('access_token');
    let selectedPriority = 'MEDIUM';

    if (!token) location.replace('/login');

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function selectPriority(priority) {
        selectedPriority = priority;
        document.getElementById('btn-high').className   = 'priority-btn';
        document.getElementById('btn-medium').className = 'priority-btn';
        document.getElementById('btn-low').className    = 'priority-btn';

        if (priority === 'HIGH')   document.getElementById('btn-high').className   = 'priority-btn selected-high';
        if (priority === 'MEDIUM') document.getElementById('btn-medium').className = 'priority-btn selected-medium';
        if (priority === 'LOW')    document.getElementById('btn-low').className    = 'priority-btn selected-low';
    }

    async function submitTicket() {
        const title   = document.getElementById('input-title').value.trim();
        const content = document.getElementById('input-content').value.trim();

        if (!title)   { showToast('제목을 입력해주세요.'); return; }
        if (!content) { showToast('내용을 입력해주세요.'); return; }

        try {
            const res = await fetch('/api/tickets', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, content, priority: selectedPriority })
            });

            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();

            if (data.isSuccess) {
                showToast('티켓이 등록됐습니다! 🎉');
                setTimeout(() => location.replace('/static/pages/ticket.html'), 1000);
            } else {
                showToast(data.message || '등록에 실패했습니다.');
            }
        } catch {
            showToast('오류가 발생했습니다.');
        }
    }

    function logout() {
        sessionStorage.clear();
        location.replace('/login');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <span>공지사항</span>
    </nav>
    <h1>공지사항</h1>
</header>

<main class="main-content">

    <div class="toolbar">
        <div class="toolbar-left"></div>
        <div class="toolbar-right">
            <button class="btn btn-primary" id="btn-write" style="display:none" onclick="location.href='/notice/create'">
                <i class="fa-solid fa-pen"></i> 글쓰기
            </button>
        </div>
    </div>

    <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="제목으로 검색..." oninput="filterNotices()">
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th class="td-num">번호</th>
                    <th>제목</th>
                    <th class="td-date">작성일</th>
                    <th class="td-view">조회수</th>
                </tr>
            </thead>
            <tbody id="notice-list">
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:30px"></div></td><td><div class="skeleton-bar" style="width:60%"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td><td><div class="skeleton-bar" style="width:30px"></div></td></tr>
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:30px"></div></td><td><div class="skeleton-bar" style="width:45%"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td><td><div class="skeleton-bar" style="width:30px"></div></td></tr>
                <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:30px"></div></td><td><div class="skeleton-bar" style="width:55%"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td><td><div class="skeleton-bar" style="width:30px"></div></td></tr>
            </tbody>
        </table>
    </div>

</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    let allNotices = [];

    if (!token) location.replace('/login');
    if (role === 'ADMIN' || role === 'SUPERADMIN') {
        document.getElementById('btn-write').style.display = 'flex';
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function filterNotices() {
        const q = document.getElementById('search-input').value.toLowerCase();
        renderNotices(allNotices.filter(n => n.title.toLowerCase().includes(q)));
    }

    function renderNotices(list) {
        const tbody = document.getElementById('notice-list');
        tbody.innerHTML = '';
        if (!list.length) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="empty-icon"><i class="fa-solid fa-inbox"></i></div><p>등록된 공지사항이 없습니다.</p></div></td></tr>`;
            return;
        }
        let num = list.filter(n => !n.isPinned).length;
        list.forEach(n => {
            const tr = document.createElement('tr');
            tr.onclick = () => location.href = `/notice/${n.noticeId}`;
            tr.innerHTML = `
                <td class="td-num">${n.isPinned ? '-' : num--}</td>
                <td><div class="td-title">${n.isPinned ? '<span class="pin-badge"><i class="fa-solid fa-thumbtack"></i> 고정</span>' : ''}${n.title}</div></td>
                <td class="td-date">${n.createdAt.slice(0,10)}</td>
                <td class="td-view">${n.viewCount}</td>`;
            tbody.appendChild(tr);
        });
    }

    async function loadNotices() {
        try {
            const res = await fetch('/api/notices', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            allNotices = data.result || [];
            renderNotices(allNotices);
        } catch { showToast('데이터를 불러오지 못했습니다.'); }
    }

    async function loadNotifyCount() {
        if (role !== 'ADMIN' && role !== 'SUPERADMIN') return;
        try {
            const res = await fetch('/api/tickets/notify/count', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            const count = data.result?.count || 0;
            const badge = document.getElementById('notify-badge');
            if (count > 0 && badge) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            }
        } catch {}
    }

    loadNotices();
    loadNotifyCount();
</script>
</body>
</html>

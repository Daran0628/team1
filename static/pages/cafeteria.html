<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 식사</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/rbac.css">
    <link rel="stylesheet" href="/static/css/cafeteria.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <span>오늘의 식사</span>
    </nav>
    <h1>오늘의 식사</h1>
</header>

<main class="main-content">

<div class="cafeteria-grid">

    <!-- 왼쪽: 캘린더 -->
    <section class="calendar-section">
        <div class="calendar-header">
            <h2 id="calendarTitle"></h2>
            <div class="calendar-nav">
                <button id="btnPrevMonth"><i class="fa-solid fa-chevron-left"></i> 이전</button>
                <button id="btnNextMonth">다음 <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <table class="calendar-table">
            <thead>
                <tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </section>

    <!-- 오른쪽: 오늘 메뉴 + 추천 -->
    <section class="today-section">
        <div class="today-card">
            <h3><i class="fa-solid fa-bowl-rice"></i> 구내식당 메뉴</h3>
            <div class="today-menu-text" id="todayMenuText">불러오는 중...</div>
        </div>
        <div class="recommend-card">
            <h3 class="recommend-title"><span class="dice">🎲</span> <span class="recommend-main">오늘 날씨엔</span> <span class="recommend-sub">이런 메뉴 어때요?</span></h3>
            <button class="recommend-btn" id="btnRecommend">날씨 기반 메뉴 추천받기</button>
            <div class="recommend-result" id="recommendResult">
                <div class="recommend-food" id="recFood"></div>
                <div class="recommend-reason" id="recReason"></div>
                <div class="recommend-weather" id="recWeather"></div>
            </div>
        </div>
    </section>

</div>

</main>

<!-- 메뉴 상세 모달 -->
<div class="menu-detail-overlay" id="menuDetailOverlay">
    <div class="menu-detail-box">
        <div class="menu-detail-date" id="detailDate"></div>
        <div class="menu-detail-text" id="detailText"></div>
        <button class="menu-detail-close" id="detailCloseBtn">닫기</button>
    </div>
</div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script src="/static/js/cafeteria.js"></script>
<script src="/static/js/sidebar_auth.js"></script>
</body>
</html>

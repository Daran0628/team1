<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ 등록 | 업무지원포털</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; }

        .sidebar { width: 240px; min-height: 100vh; background: #1a1a2e; padding: 2rem 1.25rem; display: flex; flex-direction: column; gap: 6px; position: fixed; top: 0; left: 0; bottom: 0; }
        .logo { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo span { color: #4f46e5; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .nav-item.active { background: #4f46e5; color: #fff; }
        .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
        .sidebar-bottom { margin-top: auto; }

        .main { margin-left: 240px; flex: 1; padding: 2.5rem 2rem; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #6b7280; font-size: 0.875rem; cursor: pointer; margin-bottom: 1.5rem; text-decoration: none; transition: color 0.2s; }
        .back-btn:hover { color: #4f46e5; }
        .page-title { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 1.5rem; }

        .form-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 2rem 2.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit; }
        .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
        textarea.form-input { resize: vertical; min-height: 160px; }

        .form-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid #f3f4f6; }
        .btn { padding: 10px 24px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-cancel { background: #f3f4f6; color: #374151; }
        .btn-cancel:hover { background: #e5e7eb; }
        .btn-submit { background: #4f46e5; color: #fff; }
        .btn-submit:hover { background: #4338ca; }

        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1f2937; color: #fff; padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.875rem; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Work<span>Portal</span></div>
    <a href="/static/pages/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> 대시보드</a>
    <a href="/static/pages/notice.html" class="nav-item"><span class="nav-icon">📢</span> 공지사항</a>
    <a href="/static/pages/faq.html" class="nav-item active"><span class="nav-icon">❓</span> FAQ</a>
    <a href="/static/pages/ticket.html" class="nav-item"><span class="nav-icon">🎫</span> 헬프데스크</a>
    <a href="/static/pages/mypage.html" class="nav-item"><span class="nav-icon">👤</span> 마이페이지</a>
    <a href="/static/pages/admin.html" class="nav-item" id="admin-menu" style="display:none"><span class="nav-icon">⚙️</span> 관리자</a>
    <div class="sidebar-bottom">
        <a href="#" class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> 로그아웃</a>
    </div>
</div>

<div class="main">
    <a class="back-btn" onclick="history.back()">← 목록으로</a>
    <h1 class="page-title">FAQ 등록</h1>

    <div class="form-card">
        <div class="form-group">
            <label class="form-label">질문 *</label>
            <input type="text" class="form-input" id="input-question" placeholder="질문을 입력해주세요">
        </div>
        <div class="form-group">
            <label class="form-label">답변 *</label>
            <textarea class="form-input" id="input-answer" placeholder="답변을 입력해주세요"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">카테고리</label>
            <input type="text" class="form-input" id="input-category" placeholder="예: 인사, IT, 복지 (선택)">
        </div>
        <div class="form-footer">
            <button class="btn btn-cancel" onclick="history.back()">취소</button>
            <button class="btn btn-submit" onclick="submitFaq()">등록</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');

    if (!token) location.replace('/login');
    if (role !== 'ADMIN' && role !== 'SUPERADMIN') {
        alert('관리자만 접근 가능합니다.');
        location.replace('/static/pages/faq.html');
    } else {
        document.getElementById('admin-menu').style.display = 'flex';
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function submitFaq() {
        const question = document.getElementById('input-question').value.trim();
        const answer   = document.getElementById('input-answer').value.trim();
        const category = document.getElementById('input-category').value.trim();

        if (!question) { showToast('질문을 입력해주세요.'); return; }
        if (!answer)   { showToast('답변을 입력해주세요.'); return; }

        try {
            const res = await fetch('/api/faqs', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question, answer, category })
            });

            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();

            if (data.isSuccess) {
                showToast('등록됐습니다! 🎉');
                setTimeout(() => location.replace('/static/pages/faq.html'), 1000);
            } else {
                showToast(data.message || '등록에 실패했습니다.');
            }
        } catch {
            showToast('오류가 발생했습니다.');
        }
    }

    function logout() {
        sessionStorage.clear();
        location.replace('/login');
    }
</script>
</body>
</html>

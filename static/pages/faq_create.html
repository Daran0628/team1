<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ 등록 | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <a href="/static/pages/faq.html">FAQ</a> <span>›</span>
        <span>등록</span>
    </nav>
    <h1>FAQ 등록</h1>
</header>

<main class="main-content">
    <a class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> 목록으로</a>

    <div class="form-card">
        <div class="form-group">
            <label class="form-label">질문 *</label>
            <input type="text" class="form-input" id="input-question" placeholder="질문을 입력해주세요">
        </div>
        <div class="form-group">
            <label class="form-label">답변 *</label>
            <textarea class="form-input" id="input-answer" placeholder="답변을 입력해주세요"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">카테고리</label>
            <input type="text" class="form-input" id="input-category" placeholder="예: 인사, IT, 복지 (선택)">
        </div>
        <div class="form-footer">
            <button class="btn btn-cancel" onclick="history.back()">취소</button>
            <button class="btn btn-submit" onclick="submitFaq()">등록</button>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');

    if (!token) location.replace('/login');
    if (role !== 'ADMIN' && role !== 'SUPERADMIN') {
        alert('관리자만 접근 가능합니다.');
        location.replace('/static/pages/faq.html');
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function submitFaq() {
        const question = document.getElementById('input-question').value.trim();
        const answer   = document.getElementById('input-answer').value.trim();
        const category = document.getElementById('input-category').value.trim();

        if (!question) { showToast('질문을 입력해주세요.'); return; }
        if (!answer)   { showToast('답변을 입력해주세요.'); return; }

        try {
            const res = await fetch('/api/faqs', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question, answer, category })
            });

            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();

            if (data.isSuccess) {
                showToast('등록됐습니다!', 'success');
                setTimeout(() => location.replace('/static/pages/faq.html'), 1000);
            } else {
                showToast(data.message || '등록에 실패했습니다.');
            }
        } catch {
            showToast('오류가 발생했습니다.');
        }
    }

</script>
</body>
</html>

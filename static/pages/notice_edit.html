<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 수정 | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <a href="/notice">공지사항</a> <span>›</span>
        <span>수정</span>
    </nav>
    <h1>공지사항 수정</h1>
</header>

<main class="main-content">
    <a class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> 목록으로</a>

    <div class="form-card">
        <div class="form-group">
            <label class="form-label">제목 *</label>
            <input type="text" class="form-input" id="input-title" placeholder="제목을 입력해주세요">
        </div>
        <div class="form-group">
            <label class="form-label">내용 *</label>
            <textarea class="form-input" id="input-content" placeholder="내용을 입력해주세요"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">상단 고정</label>
            <div class="pin-toggle">
                <label class="toggle">
                    <input type="checkbox" id="input-pinned">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">고정 공지로 설정</span>
            </div>
        </div>
        <div class="form-footer">
            <button class="btn btn-cancel" onclick="history.back()">취소</button>
            <button class="btn btn-submit" onclick="submitEdit()">수정 완료</button>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    const noticeId = decodeURIComponent(location.pathname.split('/')[2] || '');

    if (!token) location.replace('/login');
    if (!noticeId) location.replace('/notice');
    if (role !== 'ADMIN' && role !== 'SUPERADMIN') {
        alert('관리자만 접근 가능합니다.');
        location.replace('/notice');
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function loadNotice() {
        try {
            const res = await fetch(`/api/notices/${noticeId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            const n = data.result;

            document.getElementById('input-title').value = n.title;
            document.getElementById('input-content').value = n.content;
            document.getElementById('input-pinned').checked = n.isPinned;
        } catch {
            showToast('데이터를 불러오지 못했습니다.');
        }
    }

    async function submitEdit() {
        const title    = document.getElementById('input-title').value.trim();
        const content  = document.getElementById('input-content').value.trim();
        const isPinned = document.getElementById('input-pinned').checked;

        if (!title) { showToast('제목을 입력해주세요.'); return; }
        if (!content) { showToast('내용을 입력해주세요.'); return; }

        try {
            const res = await fetch(`/api/notices/${noticeId}`, {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, content, isPinned })
            });

            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();

            if (data.isSuccess) {
                showToast('수정됐습니다!', 'success');
                setTimeout(() => location.replace(`/notice/${noticeId}`), 1000);
            } else {
                showToast(data.message || '수정에 실패했습니다.');
            }
        } catch {
            showToast('오류가 발생했습니다.');
        }
    }

    loadNotice();
</script>
</body>
</html>

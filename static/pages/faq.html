<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
    <link rel="stylesheet" href="/static/css/faq.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <span>FAQ</span>
    </nav>
    <h1>FAQ</h1>
</header>

<main class="main-content">

    <div class="toolbar">
        <div class="toolbar-left"></div>
        <div class="toolbar-right">
            <button class="btn btn-primary" id="btn-write" style="display:none" onclick="location.href='/static/pages/faq_create.html'">
                <i class="fa-solid fa-pen"></i> 등록
            </button>
        </div>
    </div>

    <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="질문 검색..." oninput="filterFaqs()">
    </div>

    <div class="category-tabs" id="category-tabs">
        <button class="tab-btn active" onclick="filterByCategory(null, this)">전체</button>
    </div>

    <div id="faq-list">
        <div class="skeleton-item"><div class="skeleton-bar" style="width:70%"></div></div>
        <div class="skeleton-item"><div class="skeleton-bar" style="width:55%"></div></div>
        <div class="skeleton-item"><div class="skeleton-bar" style="width:65%"></div></div>
    </div>

</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    const isAdmin = (role === 'ADMIN' || role === 'SUPERADMIN');
    let allFaqs = [];
    let currentCategory = null;

    if (!token) location.replace('/login');
    if (isAdmin) {
        document.getElementById('btn-write').style.display = 'flex';
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function toggleFaq(item) {
        item.classList.toggle('open');
    }

    function filterByCategory(category, btn) {
        currentCategory = category;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterFaqs();
    }

    function filterFaqs() {
        const q = document.getElementById('search-input').value.toLowerCase();
        let filtered = allFaqs;
        if (currentCategory) filtered = filtered.filter(f => f.category === currentCategory);
        if (q) filtered = filtered.filter(f => f.question.toLowerCase().includes(q));
        renderFaqs(filtered);
    }

    function renderFaqs(list) {
        const container = document.getElementById('faq-list');
        container.innerHTML = '';
        if (!list.length) {
            container.innerHTML = `<div class="empty"><div class="empty-icon"><i class="fa-solid fa-circle-question"></i></div><p>등록된 FAQ가 없습니다.</p></div>`;
            return;
        }
        list.forEach(f => {
            const div = document.createElement('div');
            div.className = 'faq-item';
            div.innerHTML = `
                <div class="faq-question" onclick="toggleFaq(this.parentElement)">
                    <div class="faq-q-text">
                        <span class="q-badge">Q</span>
                        ${f.question}
                        ${f.category ? `<span class="category-tag">${f.category}</span>` : ''}
                    </div>
                    <span class="faq-arrow"><i class="fa-solid fa-chevron-down"></i></span>
                </div>
                <div class="faq-answer">
                    <p><strong>A.</strong> ${f.answer}</p>
                    ${isAdmin ? `
                        <div class="faq-actions">
                            <button class="btn-mini btn-mini-edit" onclick="event.stopPropagation(); location.href='/static/pages/faq_edit.html?id=${f.faqId}'">수정</button>
                            <button class="btn-mini btn-mini-delete" onclick="event.stopPropagation(); deleteFaq('${f.faqId}')">삭제</button>
                        </div>` : ''}
                </div>`;
            container.appendChild(div);
        });
    }

    async function deleteFaq(faqId) {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        try {
            const res = await fetch(`/api/faqs/${faqId}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                showToast('삭제됐습니다.');
                loadFaqs();
            } else {
                showToast('삭제에 실패했습니다.');
            }
        } catch {
            showToast('오류가 발생했습니다.');
        }
    }

    function buildCategoryTabs(faqs) {
        const categories = [...new Set(faqs.map(f => f.category).filter(Boolean))];
        const tabsEl = document.getElementById('category-tabs');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.textContent = cat;
            btn.onclick = () => filterByCategory(cat, btn);
            tabsEl.appendChild(btn);
        });
    }

    async function loadFaqs() {
        try {
            const res = await fetch('/api/faqs', { headers: { 'Authorization': 'Bearer ' + token } });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            allFaqs = data.result || [];
            document.getElementById('category-tabs').innerHTML = `<button class="tab-btn active" onclick="filterByCategory(null, this)">전체</button>`;
            buildCategoryTabs(allFaqs);
            renderFaqs(allFaqs);
        } catch { showToast('데이터를 불러오지 못했습니다.'); }
    }

    async function loadNotifyCount() {
        if (!isAdmin) return;
        try {
            const res = await fetch('/api/tickets/notify/count', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            const count = data.result?.count || 0;
            const badge = document.getElementById('notify-badge');
            if (count > 0 && badge) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            }
        } catch {}
    }

    loadFaqs();
    loadNotifyCount();
</script>
</body>
</html>

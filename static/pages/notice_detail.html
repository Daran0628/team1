<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 상세 | 업무지원포털</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/support.css">
</head>
<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <a href="/notice">공지사항</a> <span>›</span>
        <span>상세</span>
    </nav>
    <h1>공지사항 상세</h1>
</header>

<main class="main-content">
    <a class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> 목록으로</a>

    <div class="detail-card">
        <div class="detail-header">
            <div id="pin-badge" style="display:none" class="pin-badge"><i class="fa-solid fa-thumbtack"></i> 고정 공지</div>
            <div class="detail-title" id="detail-title">로딩 중...</div>
            <div class="detail-meta">
                <span><i class="fa-solid fa-calendar"></i> <span id="detail-date"></span></span>
                <span><i class="fa-solid fa-eye"></i> <span id="detail-view"></span></span>
            </div>
        </div>
        <div class="detail-body" id="detail-body"></div>
        <div class="detail-footer">
            <button class="btn btn-list" onclick="location.href='/notice'">목록</button>
            <div class="btn-group" id="admin-btns" style="display:none">
                <button class="btn btn-edit" id="btn-edit">수정</button>
                <button class="btn btn-delete" onclick="deleteNotice()">삭제</button>
            </div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    const noticeId = decodeURIComponent(location.pathname.split('/')[2] || '');

    if (!token) location.replace('/login');
    if (!noticeId) location.replace('/notice');

    if (role === 'ADMIN' || role === 'SUPERADMIN') {
        document.getElementById('admin-btns').style.display = 'flex';
        document.getElementById('btn-edit').onclick = () => {
            location.href = `/notice/${noticeId}/edit`;
        };
    }

    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-info';
        t.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function loadNotice() {
        try {
            const res = await fetch(`/api/notices/${noticeId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            const n = data.result;

            document.getElementById('detail-title').textContent = n.title;
            document.getElementById('detail-body').textContent  = n.content;
            document.getElementById('detail-date').textContent  = n.createdAt.slice(0, 10);
            document.getElementById('detail-view').textContent  = n.viewCount + ' 회';
            if (n.isPinned) document.getElementById('pin-badge').style.display = 'inline-block';
        } catch {
            showToast('데이터를 불러오지 못했습니다.');
        }
    }

    async function deleteNotice() {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        try {
            const res = await fetch(`/api/notices/${noticeId}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                showToast('삭제됐습니다.');
                setTimeout(() => location.replace('/notice'), 1000);
            }
        } catch {
            showToast('삭제에 실패했습니다.');
        }
    }

    loadNotice();
</script>
</body>
</html>

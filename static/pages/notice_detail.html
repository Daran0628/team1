<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 상세 | 업무지원포털</title>
    <link rel="stylesheet" href="/static/css/common-layout.css">
    <style>
        /* 뒤로가기 */
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #6b7280; font-size: 0.875rem; cursor: pointer; margin-bottom: 1.5rem; text-decoration: none; transition: color 0.2s; }
        .back-btn:hover { color: #4f46e5; }

        /* 카드 */
        .detail-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
        .detail-header { padding: 2rem 2.5rem; border-bottom: 1px solid #f3f4f6; }
        .pin-badge { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; background: #ede9fe; color: #6d28d9; border-radius: 20px; margin-bottom: 12px; }
        .detail-title { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 1rem; line-height: 1.4; }
        .detail-meta { display: flex; gap: 20px; font-size: 0.8rem; color: #9ca3af; }
        .detail-meta span { display: flex; align-items: center; gap: 4px; }

        .detail-body { padding: 2rem 2.5rem; font-size: 0.95rem; color: #374151; line-height: 1.8; white-space: pre-wrap; min-height: 200px; }

        /* 버튼 */
        .detail-footer { padding: 1.25rem 2.5rem; border-top: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 8px 18px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-edit { background: #4f46e5; color: #fff; }
        .btn-edit:hover { background: #4338ca; }
        .btn-delete { background: #fee2e2; color: #b91c1c; }
        .btn-delete:hover { background: #fecaca; }
        .btn-list { background: #f3f4f6; color: #374151; }
        .btn-list:hover { background: #e5e7eb; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Work<span>Portal</span></div>
    <a href="/static/pages/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> 대시보드</a>
    <a href="/static/pages/notice.html" class="nav-item active"><span class="nav-icon">📢</span> 공지사항</a>
    <a href="/static/pages/faq.html" class="nav-item"><span class="nav-icon">❓</span> FAQ</a>
    <a href="/static/pages/ticket.html" class="nav-item"><span class="nav-icon">🎫</span> 헬프데스크</a>
    <a href="/mail" class="nav-item"><span class="nav-icon">📧</span> 메일</a>
                    <a href="/objstorage" class="nav-item"><span class="nav-icon">🗄️</span> 오브젝트 스토리지</a>
                    <a href="/static/pages/mypage.html" class="nav-item"><span class="nav-icon">👤</span> 마이페이지</a>
    <div class="sidebar-bottom">
        <a href="#" class="nav-item" onclick="logout()"><span class="nav-icon">🚪</span> 로그아웃</a>
    </div>
</div>

<div class="main">
    <a class="back-btn" onclick="history.back()">← 목록으로</a>

    <div class="detail-card">
        <div class="detail-header">
            <div id="pin-badge" style="display:none" class="pin-badge">📌 고정 공지</div>
            <div class="detail-title" id="detail-title">로딩 중...</div>
            <div class="detail-meta">
                <span>📅 <span id="detail-date"></span></span>
                <span>👁 <span id="detail-view"></span></span>
            </div>
        </div>
        <div class="detail-body" id="detail-body"></div>
        <div class="detail-footer">
            <button class="btn btn-list" onclick="location.href='/static/pages/notice.html'">목록</button>
            <div class="btn-group" id="admin-btns" style="display:none">
                <button class="btn btn-edit" id="btn-edit">수정</button>
                <button class="btn btn-delete" onclick="deleteNotice()">삭제</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const token = sessionStorage.getItem('access_token');
    const role  = sessionStorage.getItem('role');
    const params = new URLSearchParams(location.search);
    const noticeId = params.get('id');

    if (!token) location.replace('/login');
    if (!noticeId) location.replace('/static/pages/notice.html');

    if (role === 'ADMIN' || role === 'SUPERADMIN') {
        document.getElementById('admin-btns').style.display = 'flex';
        document.getElementById('btn-edit').onclick = () => {
            location.href = `/static/pages/notice_edit.html?id=${noticeId}`;
        };
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function loadNotice() {
        try {
            const res = await fetch(`/api/notices/${noticeId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.status === 401) { location.replace('/login'); return; }
            const data = await res.json();
            const n = data.result;

            document.getElementById('detail-title').textContent = n.title;
            document.getElementById('detail-body').textContent  = n.content;
            document.getElementById('detail-date').textContent  = n.createdAt.slice(0, 10);
            document.getElementById('detail-view').textContent  = n.viewCount + ' 회';
            if (n.isPinned) document.getElementById('pin-badge').style.display = 'inline-block';
        } catch {
            showToast('데이터를 불러오지 못했습니다.');
        }
    }

    async function deleteNotice() {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        try {
            const res = await fetch(`/api/notices/${noticeId}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                showToast('삭제됐습니다.');
                setTimeout(() => location.replace('/static/pages/notice.html'), 1000);
            }
        } catch {
            showToast('삭제에 실패했습니다.');
        }
    }

    function logout() {
        sessionStorage.clear();
        location.replace('/login');
    }

    loadNotice();
</script>
</body>
</html>

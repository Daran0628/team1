<div class="main">

<div class="mypage-container">
    <div class="mypage-card">

        <div class="mypage-header">
            <h1>마이페이지</h1>
        </div>

        <div class="profile-grid">

            <div class="form-group">
                <label>아이디</label>
                <span id="accountIdText"></span>
                <input id="accountIdInput" disabled class="edit-field">
            </div>

            <div class="form-group">
                <label>이름</label>
                <span id="nameText"></span>
                <input id="nameInput" disabled class="edit-field">
            </div>

            <div class="form-group">
                <label>사원번호</label>
                <span id="employeeNoText"></span>
                <input id="employeeNoInput" disabled class="edit-field">
            </div>

            <div class="form-group">
                <label>이메일</label>
                <span id="emailText"></span>
                <input id="emailInput" class="edit-field">
            </div>

            <div class="form-group">
                <label>주소</label>
                <span id="addressText"></span>
                <input id="addressInput" class="edit-field">
            </div>

            <div class="form-group">
                <label>부서</label>
                <span id="departmentText"></span>
                <input id="departmentInput" disabled class="edit-field">
            </div>

            <div class="form-group">
                <label>차량번호</label>
                <span id="carNumText"></span>
                <input id="carNumInput" class="edit-field">
            </div>

            <div class="form-group">
                <label>계정</label>
                <span id="accountTypeText"></span>
                <input id="accountTypeInput" class="edit-field" disabled>
            </div>

            <div class="form-group">
                <label>파트</label>
                <span id="workTypeText"></span>
                <input id="workTypeInput" class="edit-field">
            </div>

            <div class="form-group">
                <label>마지막 로그인</label>
                <span id="lastLoginText"></span>
                <input id="lastLoginInput" disabled class="edit-field">
            </div>

        </div>

        <div class="button-group">
            <button id="btnEdit" class="btn-primary">수정하기</button>
            <button id="btnSave" class="btn-primary" style="display:none;">저장하기</button>
            <button id="btnCancel" class="btn-secondary" style="display:none;">취소</button>
        </div>

    </div>
</div>

</div><!-- /.main -->

<script src="/static/js/api.js"></script>

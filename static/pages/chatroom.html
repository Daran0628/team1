<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self'; script-src 'self'; connect-src 'self'">
    <title>채팅방</title>
    <link rel="stylesheet" href="/static/css/rbac.css">
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>

<div class="chat-layout">

    <!-- ── 사이드바 ── -->
    <aside class="chat-sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-title">채팅</span>
            <button class="btn-new-chat" id="btnNewChat" title="새 채팅">＋</button>
        </div>
        <div class="sidebar-search">
            <input type="search" id="sidebarSearch" placeholder="검색...">
        </div>
        <ul class="room-list" id="sidebarRoomList">
            <li style="padding:.75rem 1rem;font-size:.8rem;color:var(--muted)">불러오는 중...</li>
        </ul>
    </aside>

    <!-- ── 메인 영역 ── -->
    <div class="chat-main">

        <!-- 방 헤더 -->
        <div class="chat-room-header">
            <div class="chat-room-header-left">
                <span id="roomIcon" style="font-size:1.1rem">#</span>
                <div>
                    <div class="chat-room-name" id="roomName">로딩 중...</div>
                    <div class="chat-room-meta" id="roomMeta"></div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem">
                <button class="btn btn-ghost btn-icon" id="btnMembers" title="멤버 보기" style="font-size:.85rem">👥</button>
            </div>
        </div>

        <!-- 메시지 영역 -->
        <div class="messages-area" id="messagesArea">
            <div class="state-cell">메시지를 불러오는 중...</div>
        </div>

        <!-- 파일 업로드 중 표시 -->
        <div id="uploadBar" class="upload-bar" hidden>
            <span class="spinner"></span>
            <span id="uploadBarText">파일 업로드 중...</span>
        </div>

        <!-- 입력 바 -->
        <div class="chat-input-bar">
            <button class="btn-attach" id="btnAttach" title="파일 첨부">📎</button>
            <input type="file" id="fileInput" hidden>
            <textarea class="chat-textarea" id="msgInput"
                      placeholder="메시지를 입력하세요 (Shift+Enter: 줄바꿈)"
                      rows="1"></textarea>
            <button class="btn-send" id="btnSend" disabled>➤</button>
        </div>
    </div>

</div>

<!-- ══ 새 채팅방 모달 ══════════════════════════════════════════ -->
<div class="modal-overlay" id="createModal" hidden>
    <div class="modal">
        <div class="modal-head">
            <h2>새 채팅방</h2>
            <button class="btn-x" data-close="createModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="create-room-tabs">
                <button class="create-room-tab active" data-type="DIRECT">1:1 채팅</button>
                <button class="create-room-tab" data-type="GROUP">그룹 채팅</button>
            </div>
            <div id="groupNameField" class="field" hidden>
                <label for="inputRoomName">채팅방 이름 <span class="req">*</span></label>
                <input type="text" id="inputRoomName" maxlength="100" placeholder="예: 개발팀">
            </div>
            <div class="field">
                <label>멤버 선택 <span class="req">*</span></label>
                <input type="search" id="memberSearch" class="search-input"
                       style="width:100%;margin-bottom:.5rem" placeholder="이름 또는 계정 검색...">
                <div id="memberPickList" class="member-pick-list">
                    <div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:.85rem">불러오는 중...</div>
                </div>
            </div>
            <div class="form-error" id="createErr"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" data-close="createModal">취소</button>
            <button class="btn btn-primary" id="btnCreateRoom">만들기</button>
        </div>
    </div>
</div>

<!-- ══ 멤버 목록 모달 ══════════════════════════════════════════ -->
<div class="modal-overlay" id="membersModal" hidden>
    <div class="modal modal-sm">
        <div class="modal-head">
            <h2>멤버</h2>
            <button class="btn-x" data-close="membersModal">✕</button>
        </div>
        <div class="modal-body">
            <div id="membersList" style="display:flex;flex-direction:column;gap:.5rem"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" data-close="membersModal">닫기</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- ══ 이미지 라이트박스 ════════════════════════════════════════ -->
<div id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-name" id="lightboxName"></div>
</div>

<script src="/static/js/chatroom.js"></script>
</body>
</html>

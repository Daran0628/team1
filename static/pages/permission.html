<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; script-src 'self'">
    <title>IAM — Permissions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/css/rbac.css">
    <link rel="stylesheet" href="/static/css/layout.css">
</head>

<body>

<div class="app-shell">
<div id="shellSlot"></div>
<div class="app-main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <span>Administration</span> <span>›</span>
        <a href="/iam">IAM</a> <span>›</span>
        <span>Permissions</span>
    </nav>
    <h1>Permissions</h1>
</header>

<main class="main-content">

    <div class="toolbar">
        <div class="toolbar-left">
            <button id="btnAddPerm" class="btn btn-primary">⊕ Add Permission</button>
            <button id="btnRefresh" class="btn btn-icon" title="새로고침">↻</button>
        </div>
        <div class="toolbar-right">
            <span id="itemsCount" class="items-count"></span>
            <select id="typeFilter" class="search-input" style="width:auto;cursor:pointer;">
                <option value="">All types</option>
                <option value="STORAGE">STORAGE</option>
                <option value="VDI">VDI</option>
                <option value="RBAC">RBAC</option>
                <option value="BOARD">BOARD</option>
                <option value="POST">POST</option>
            </select>
            <input type="search" id="searchInput" class="search-input" placeholder="Search permissions...">
        </div>
    </div>

    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th class="col-perm-type">Type</th>
                    <th class="col-name">Actions / Description</th>
                    <th class="col-perm-res">Resources</th>
                    <th class="col-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="permBody">
                <tr><td colspan="4" class="state-cell">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-bar" id="paginationBar"></div>

</main>

<!-- ══ Add Permission Modal ════════════════════════════════════ -->
<div class="modal-overlay" id="addPermModal" hidden>
    <div class="modal modal-lg">
        <div class="modal-head">
            <h2>Add Permission</h2>
            <button class="btn-x" data-close="addPermModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="field">
                <label for="inputType">Type <span class="req">*</span></label>
                <select id="inputType" class="field-select">
                    <option value="">선택...</option>
                    <option value="STORAGE">STORAGE</option>
                    <option value="VDI">VDI</option>
                    <option value="RBAC">RBAC</option>
                    <option value="BOARD">BOARD</option>
                    <option value="POST">POST</option>
                </select>
            </div>
            <div class="field">
                <label for="inputPermDesc">Description</label>
                <input type="text" id="inputPermDesc" class="field-input" placeholder="이 권한에 대한 설명 (선택)">
            </div>
            <div class="field">
                <label>Actions <span class="req">*</span></label>
                <div class="action-grid" id="actionGrid">
                    <span class="no-perms">Type을 먼저 선택하세요</span>
                </div>
            </div>
            <!-- Resources (STORAGE 타입일 때만 표시) -->
            <div id="resourceIdsSection" hidden>
                <div class="field">
                    <label>Buckets <small style="font-weight:normal;color:#888">(선택 안 하면 전체 허용)</small></label>
                    <div class="perm-grid" id="permBucketList"></div>
                </div>
                <div class="field">
                    <label style="display:flex;align-items:center;gap:8px">
                        Objects
                        <select id="permBucketFilter" class="search-input" style="width:auto;height:28px;padding:2px 8px;font-size:13px">
                            <option value="">모든 버킷</option>
                        </select>
                    </label>
                    <div class="perm-grid" id="permObjectList"></div>
                </div>
            </div>
            <div class="form-error" id="addPermModalErr"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" data-close="addPermModal">Cancel</button>
            <button class="btn btn-primary" id="btnSavePerm">Save</button>
        </div>
    </div>
</div>

<!-- ══ Delete Confirm Modal ════════════════════════════════════ -->
<div class="modal-overlay" id="deletePermModal" hidden>
    <div class="modal modal-sm">
        <div class="modal-head">
            <h2>Delete Permission</h2>
            <button class="btn-x" data-close="deletePermModal">✕</button>
        </div>
        <div class="modal-body">
            <p id="deletePermMsg" class="delete-msg"></p>
            <div class="form-error" id="deletePermErr"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" data-close="deletePermModal">Cancel</button>
            <button class="btn btn-danger" id="btnConfirmDeletePerm">Delete</button>
        </div>
    </div>
</div>

</div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script src="/static/js/permission.js"></script>
<script src="/static/js/sidebar_auth.js"></script>
</body>
</html>

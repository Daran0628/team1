<div class="main">

<header class="page-header">
    <nav class="breadcrumb">
        <a href="/">Home</a> <span>›</span>
        <span>채팅</span>
    </nav>
    <h1>채팅</h1>
</header>

<main class="main-content">

    <div class="toolbar">
        <div class="toolbar-left">
            <button id="btnNewRoom" class="btn btn-primary">＋ 새 채팅</button>
            <button id="btnRefresh" class="btn btn-icon" title="새로고침">↻</button>
        </div>
        <div class="toolbar-right">
            <span id="roomCount" class="items-count"></span>
            <input type="search" id="searchInput" class="search-input" placeholder="채팅방 검색...">
        </div>
    </div>

    <div id="roomList" class="room-card-list">
        <div class="state-cell">불러오는 중...</div>
    </div>

</main>

</div><!-- /.main -->

<!-- ══ 새 채팅방 모달 ══════════════════════════════════════════ -->
<div class="modal-overlay" id="createModal" hidden>
    <div class="modal">
        <div class="modal-head">
            <h2>새 채팅방</h2>
            <button class="btn-x" data-close="createModal">✕</button>
        </div>
        <div class="modal-body">

            <div class="create-room-tabs">
                <button class="create-room-tab active" data-type="DIRECT">1:1 채팅</button>
                <button class="create-room-tab" data-type="GROUP">그룹 채팅</button>
            </div>

            <div id="groupNameField" class="field" hidden>
                <label for="inputRoomName">채팅방 이름 <span class="req">*</span></label>
                <input type="text" id="inputRoomName" maxlength="100" placeholder="예: 개발팀">
            </div>

            <div class="field">
                <label>멤버 선택 <span class="req">*</span></label>
                <input type="search" id="memberSearch" class="search-input member-search"
                       placeholder="이름 또는 계정 검색...">
                <div id="memberPickList" class="member-pick-list">
                    <div class="pick-empty">불러오는 중...</div>
                </div>
            </div>

            <div class="form-error" id="createErr"></div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" data-close="createModal">취소</button>
            <button class="btn btn-primary" id="btnCreateRoom">만들기</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/chat.js"></script>
<script src="/static/js/sidebar_auth.js"></script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메일</title>
    <link rel="stylesheet" href="/static/css/mail.css">
</head>
<body>

<div class="mail-layout">

    <!-- 사이드바 -->
    <aside class="mail-sidebar">
        <button class="btn-compose" id="btnCompose">+ 편지 쓰기</button>
        <ul class="folder-list">
            <li class="folder-item active" data-folder="inbox">
                <span class="folder-icon">📥</span> 받은 편지함
                <span class="badge" id="unreadBadge"></span>
            </li>
        </ul>
        <div class="sidebar-account" id="sidebarAccount"></div>
    </aside>

    <!-- 메일 목록 -->
    <section class="mail-list-panel">
        <div class="panel-header">
            <h2>받은 편지함</h2>
            <button class="btn-refresh" id="btnRefresh" title="새로고침">↻</button>
        </div>
        <ul class="mail-list" id="mailList">
            <li class="mail-empty">불러오는 중...</li>
        </ul>
    </section>

    <!-- 메일 본문 / 편지쓰기 -->
    <section class="mail-view-panel" id="mailViewPanel">

        <!-- 빈 상태 -->
        <div class="view-empty" id="viewEmpty">
            <span>메일을 선택하세요</span>
        </div>

        <!-- 본문 뷰 -->
        <div class="mail-detail" id="mailDetail" hidden>
            <div class="detail-header">
                <h3 id="detailSubject"></h3>
                <div class="detail-meta">
                    <span id="detailFrom"></span>
                    <span id="detailDate"></span>
                </div>
                <button class="btn-delete" id="btnDelete">🗑 삭제</button>
            </div>
            <div class="detail-body" id="detailBody"></div>
        </div>

        <!-- 편지 쓰기 -->
        <div class="mail-compose" id="mailCompose" hidden>
            <div class="compose-header">
                <h3>편지 쓰기</h3>
                <button class="btn-close-compose" id="btnCloseCompose">✕</button>
            </div>
            <div class="compose-form">
                <div class="form-row">
                    <label>받는 사람</label>
                    <input type="text" id="composeTo" placeholder="account@1mail.local">
                </div>
                <div class="form-row">
                    <label>제목</label>
                    <input type="text" id="composeSubject" placeholder="제목을 입력하세요">
                </div>
                <div class="form-row">
                    <label>내용</label>
                    <textarea id="composeBody" rows="12" placeholder="내용을 입력하세요"></textarea>
                </div>
                <div class="compose-actions">
                    <button class="btn-send" id="btnSend">📤 발송</button>
                </div>
                <div class="compose-msg" id="composeMsg"></div>
            </div>
        </div>

    </section>

</div>

<script src="/static/js/mail.js"></script>
</body>
</html>
